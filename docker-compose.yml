version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: collaborative_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: collaborative_api
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongo:27017/collaborative_docs
      - PORT=3000
      - WIKI_STUB_URL=https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-stub-articles1.xml.gz
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mongo_data:
